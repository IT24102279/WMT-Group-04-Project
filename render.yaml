services:
  - type: web
    name: pharmacy-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Set this to your MongoDB connection string in Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Generates a random secret if not provided
      - key: UPLOAD_DIR
        value: uploads
